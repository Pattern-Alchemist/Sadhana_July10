<?xml version="1.0" encoding="UTF-8"?>
<!--
  Bhuvaneśvarī Yantra — AstroKalki
  =================================
  Geometrically faithful rendering of the Bhuvaneśvarī Mahāvidyā yantra as
  specified in the Śāradā Tilaka (ch. on Bhuvaneśvarī) and the Śākta Praamoda.
  Bhuvaneśvarī is the fourth of the Daśa Mahāvidyās, the Goddess as the
  sovereign of all worlds (bhuvana), her bīja hrīṁ being the māyā-bīja that
  manifests the three worlds.

  Construction per the source texts:
    - Outer square bhūpura with four cardinal gates
    - 16-petalled lotus ring (the outer manifestation)
    - 8-petalled lotus ring inside (the inner matrix of creation)
    - Single inverted (downward) triangle at the center — the yoni, the
      field of manifestation of the three worlds
    - Central bindu bearing the Bhuvaneśvarī bīja hrīṁ
    - Gate bījas: East oṁ, South hrīṁ, West klīṁ, North sauḥ
    - Outer mantra ring: "hrīṁ bhuvaneśvaryai namaḥ"

  Note on geometry: The text-prescribed order is bhūpura → 16-dala → 8-dala
  → trikoṇa → bindu (Śāradā Tilaka, Bhuvaneśvarī-paddhati). This rendering
  follows that order strictly. The inverted triangle is centered on the
  figure's vertical axis with its apex pointing downward (the classical
  yoni-trikoṇa of the Mahāvidyās).

  CAUTION: HIGH — dīkṣā-restricted Mahāvidyā practice; not for uninitiated
  contemplation or ritual reproduction.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 600 600"
     width="600" height="600"
     font-family="'Noto Sans', 'Noto Serif Devanagari', serif">

  <!-- Background: lamp-soot black -->
  <rect x="0" y="0" width="600" height="600" fill="#0a0908"/>

  <!-- Outer circular mantra ring -->
  <circle cx="300" cy="300" r="295"
          fill="none"
          stroke="#c9985e"
          stroke-width="2"
          opacity="0.7"/>

  <!-- Mantra around the outer ring -->
  <defs>
    <path id="mantraRingBhuvaneshvari"
          d="M 595,300 A 295,295 0 1,1 594.99,300"
          fill="none"/>
  </defs>
  <text font-size="14" fill="#e6c089" letter-spacing="3" opacity="0.9">
    <textPath href="#mantraRingBhuvaneshvari" startOffset="0%">
      hrīṁ bhuvaneśvaryai namaḥ    hrīṁ bhuvaneśvaryai namaḥ    hrīṁ bhuvaneśvaryai namaḥ    hrīṁ bhuvaneśvaryai namaḥ    hrīṁ bhuvaneśvaryai namaḥ
    </textPath>
  </text>

  <!-- Outer bhūpura (square frame with four gates) -->
  <line x1="5"   y1="5"   x2="250" y2="5"   stroke="#c9985e" stroke-width="10"/>
  <line x1="350" y1="5"   x2="595" y2="5"   stroke="#c9985e" stroke-width="10"/>
  <line x1="595" y1="5"   x2="595" y2="250" stroke="#c9985e" stroke-width="10"/>
  <line x1="595" y1="350" x2="595" y2="595" stroke="#c9985e" stroke-width="10"/>
  <line x1="595" y1="595" x2="350" y2="595" stroke="#c9985e" stroke-width="10"/>
  <line x1="250" y1="595" x2="5"   y2="595" stroke="#c9985e" stroke-width="10"/>
  <line x1="5"   y1="595" x2="5"   y2="350" stroke="#c9985e" stroke-width="10"/>
  <line x1="5"   y1="250" x2="5"   y2="5"   stroke="#c9985e" stroke-width="10"/>

  <!-- Inner bhūpura (second ring) -->
  <rect x="55" y="55" width="490" height="490"
        fill="none" stroke="#9a7340" stroke-width="1.5" opacity="0.6"/>

  <!-- 16-petalled lotus ring (outer lotus) -->
  <g transform="translate(300, 300)">
    <g fill="none" stroke="#c9985e" stroke-width="1.4" opacity="0.75">
      <g transform="rotate(0)"><ellipse cx="0" cy="-200" rx="22" ry="55"/></g>
      <g transform="rotate(22.5)"><ellipse cx="0" cy="-200" rx="22" ry="55"/></g>
      <g transform="rotate(45)"><ellipse cx="0" cy="-200" rx="22" ry="55"/></g>
      <g transform="rotate(67.5)"><ellipse cx="0" cy="-200" rx="22" ry="55"/></g>
      <g transform="rotate(90)"><ellipse cx="0" cy="-200" rx="22" ry="55"/></g>
      <g transform="rotate(112.5)"><ellipse cx="0" cy="-200" rx="22" ry="55"/></g>
      <g transform="rotate(135)"><ellipse cx="0" cy="-200" rx="22" ry="55"/></g>
      <g transform="rotate(157.5)"><ellipse cx="0" cy="-200" rx="22" ry="55"/></g>
      <g transform="rotate(180)"><ellipse cx="0" cy="-200" rx="22" ry="55"/></g>
      <g transform="rotate(202.5)"><ellipse cx="0" cy="-200" rx="22" ry="55"/></g>
      <g transform="rotate(225)"><ellipse cx="0" cy="-200" rx="22" ry="55"/></g>
      <g transform="rotate(247.5)"><ellipse cx="0" cy="-200" rx="22" ry="55"/></g>
      <g transform="rotate(270)"><ellipse cx="0" cy="-200" rx="22" ry="55"/></g>
      <g transform="rotate(292.5)"><ellipse cx="0" cy="-200" rx="22" ry="55"/></g>
      <g transform="rotate(315)"><ellipse cx="0" cy="-200" rx="22" ry="55"/></g>
      <g transform="rotate(337.5)"><ellipse cx="0" cy="-200" rx="22" ry="55"/></g>
    </g>
  </g>

  <!-- 8-petalled lotus ring (inner lotus) -->
  <g transform="translate(300, 300)">
    <g fill="none" stroke="#e6c089" stroke-width="1.8" opacity="0.9">
      <g transform="rotate(0)"><ellipse cx="0" cy="-135" rx="18" ry="48"/></g>
      <g transform="rotate(45)"><ellipse cx="0" cy="-135" rx="18" ry="48"/></g>
      <g transform="rotate(90)"><ellipse cx="0" cy="-135" rx="18" ry="48"/></g>
      <g transform="rotate(135)"><ellipse cx="0" cy="-135" rx="18" ry="48"/></g>
      <g transform="rotate(180)"><ellipse cx="0" cy="-135" rx="18" ry="48"/></g>
      <g transform="rotate(225)"><ellipse cx="0" cy="-135" rx="18" ry="48"/></g>
      <g transform="rotate(270)"><ellipse cx="0" cy="-135" rx="18" ry="48"/></g>
      <g transform="rotate(315)"><ellipse cx="0" cy="-135" rx="18" ry="48"/></g>
    </g>
  </g>

  <!-- Inverted triangle (yoni-trikoṇa) at the center — downward-pointing -->
  <!-- Apex at bottom (300, 440), base at top y=210 from x=170 to x=430 -->
  <polygon points="170,210 430,210 300,440"
           fill="none" stroke="#c9985e" stroke-width="2.4" opacity="0.95"/>
  <!-- Inner concentric triangle for visual depth -->
  <polygon points="190,235 410,235 300,410"
           fill="none" stroke="#9a7340" stroke-width="1" opacity="0.5"/>

  <!-- Central bindu — the Bhuvaneśvarī bīja hrīṁ -->
  <circle cx="300" cy="300" r="11" fill="#000000"/>
  <circle cx="300" cy="300" r="13" fill="none" stroke="#e6c089" stroke-width="1" opacity="0.7"/>
  <text x="300" y="306" text-anchor="middle"
        font-size="20" fill="#e6c089" font-weight="bold">hrīṁ</text>

  <!-- Gate bīja labels -->
  <!-- East gate — oṁ -->
  <text x="570" y="306" text-anchor="end" font-size="22" fill="#e6c089" font-weight="bold">oṁ</text>
  <!-- South gate — hrīṁ -->
  <text x="306" y="585" text-anchor="middle" font-size="22" fill="#e6c089" font-weight="bold">hrīṁ</text>
  <!-- West gate — klīṁ -->
  <text x="30" y="306" text-anchor="start" font-size="22" fill="#e6c089" font-weight="bold">klīṁ</text>
  <!-- North gate — sauḥ -->
  <text x="306" y="30" text-anchor="middle" font-size="22" fill="#e6c089" font-weight="bold">sauḥ</text>

  <!-- Title and attribution -->
  <text x="300" y="630" text-anchor="middle"
        font-size="11" fill="#9a7340" letter-spacing="3" opacity="0.8">
    BHUVANEŚVARĪ YANTRA · ŚĀRADĀ TILAKA / ŚĀKTA PRAAMODA · CAUTION: HIGH
  </text>

</svg>
