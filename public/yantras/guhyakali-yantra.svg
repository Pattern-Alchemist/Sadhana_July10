          stroke-width="2"
          opacity="0.7"/>

  <!-- Mantra around the outer ring -->
  <defs>
    <path id="mantraRingGuhyakali"
          d="M 595,300 A 295,295 0 1,1 594.99,300"
          fill="none"/>
  </defs>
  <text font-size="14" fill="#e6c089" letter-spacing="3" opacity="0.9">
    <textPath href="#mantraRingGuhyakali" startOffset="0%">
      oṁ hrīṁ klīṁ hūṁ guhyakālyai namaḥ    oṁ hrīṁ klīṁ hūṁ guhyakālyai namaḥ    oṁ hrīṁ klīṁ hūṁ guhyakālyai namaḥ    oṁ hrīṁ klīṁ hūṁ guhyakālyai namaḥ    oṁ hrīṁ klīṁ hūṁ guhyakālyai namaḥ
    </textPath>
  </text>

