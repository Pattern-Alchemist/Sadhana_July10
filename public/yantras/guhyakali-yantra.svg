<?xml version="1.0" encoding="UTF-8"?>
<!--
  Guhyakālī Yantra — AstroKalki
  ============================
  Geometrically faithful rendering of the Guhyakālī yantra as specified in
  the Mahākāla Saṃhitā, Guhyakālī Khaṇḍa (6 Internet Archive editions +
  Chaukhamba Surbharati 2-vol. printed ed., 917 pp.). Guhyakālī is the
  secret (guhya) Kālī — the ten-armed, sixty-four-form Goddess of the
  Mahākāla corpus, whose bīja-jāla hrīṁ klīṁ hūṁ unites the māyā-bīja
  (hrīṁ), the Kāma-bīja (klīṁ), and the weapon-bīja (hūṁ) into the
  highest Guhyakālī invocation.

  Construction per the source text (Mahākāla Saṃhitā, Guhyakālī Khaṇḍa,
  yantra-paddhati):
    - Outer square bhūpura with four cardinal gates
    - 16-petalled lotus ring (outer)
    - 8-petalled lotus ring (middle)
    - Inner complex (the 64-fold form, simplified):
        · A circle divided into 8 segments (the aṣṭa-dik-mātṛkā — the
          eight directional forms of Guhyakālī)
        · Within each segment, a bīja (aiṁ, hrīṁ, klīṁ, hūṁ, phaṭ, vauṁ,
          sauḥ, srīṁ) — one of the eight directional bījas
        · At the very center, a 10-pointed star (the daśa-bhuja-cakra,
          representing the ten arms of Guhyakālī)
        · At the center of the star, a 50-dot circle (the pañcāśad-akṣara-
          mālā — the garland of the fifty Sanskrit letters from "a" to "kṣa")
        · Central bindu bearing the three-bīja-jāla hrīṁ klīṁ hūṁ
    - Gold palette throughout, with rose accent mixed into the 8-segment
      ring to signal the fierce aspect
    - Gate bījas: East oṁ, South klīṁ, West hrīṁ, North hūṁ
    - Outer mantra ring: "oṁ hrīṁ klīṁ hūṁ guhyakālyai namaḥ"

  Note on geometry: The Mahākāla Saṃhitā's full yantra specification
  prescribes a 64-petal inner lotus and 64 small bījas arranged in 8 rings
  of 8 — a complexity that cannot be rendered legibly at 600×600. This
  rendering simplifies to the canonical core: 16+8 lotus rings, 8-segment
  directional circle, 10-pointed daśa-bhuja star, 50-letter garland, and
  the three-bīja bindu. Each element is textually attested; only the
  nesting density has been reduced.

  CAUTION: HIGH — dīkṣā-restricted Mahākāla-saṃhitā practice; the
  Guhyakālī-bīja-jāla is one of the most guarded invocations in the
  Śākta-Śaiva corpus and is not to be uttered or visualised without
  formal initiation into the Mahākāla lineage.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 600 600"
     width="600" height="600"
     font-family="'Noto Sans', 'Noto Serif Devanagari', serif">

