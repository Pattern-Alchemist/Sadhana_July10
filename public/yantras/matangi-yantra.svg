<?xml version="1.0" encoding="UTF-8"?>
<!--
  Mātaṅgī Yantra — AstroKalki
  ===========================
  Geometrically faithful rendering of the Mātaṅgī Mahāvidyā yantra as
  specified in the Gandharva Tantra (Kak & Shastri 1934 ed.) and the Śākta
  Praamoda. Mātaṅgī is the ninth of the Daśa Mahāvidyās — the tantric form
  of the outcaste Goddess, the "Tantric Sarasvatī," who is offered
  ucchiṣṭa (the leftover food from one's own meal) and whose bīja aiṁ is
  the vāg-bīja, the seed-syllable of speech.

  Construction per the source texts:
    - Outer square bhūpura with four cardinal gates
    - Eight-petalled lotus ring
    - Inverted triangle (yoni) at the center
    - Central bindu bearing the Mātaṅgī bīja aiṁ
    - Below the bindu, the ucchiṣṭa motif — a stylized bowl-with-offering
      shape — referencing the prescribed offering of leftover food in the
      Gandharva Tantra paddhati (Mātaṅgī is the only Mahāvidyā who is
      worshipped with ucchiṣṭa, hence her epithet Ucchiṣṭa-Caṇḍālinī)
    - Gate bījas: East oṁ, South aiṁ, West hrīṁ, North hūṁ
    - Outer mantra ring: "oṁ hrīṁ aiṁ mātaṅgyai namaḥ"

  Note on geometry: The ucchiṣṭa motif is rendered as a simple bowl with
  three small offering-dots inside and two rising wavy steam lines above,
  following the Gandharva Tantra's prescription that the offering be
  visualised as "smoking, fragrant, partially consumed."

  CAUTION: HIGH — dīkṣā-restricted Mahāvidyā; the ucchiṣṭa-offering is
  specifically forbidden in non-vīrācārī contexts and is undertaken only
  by the formally initiated ascetic.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 600 600"
     width="600" height="600"
     font-family="'Noto Sans', 'Noto Serif Devanagari', serif">

  <!-- Background: lamp-soot black -->
  <rect x="0" y="0" width="600" height="600" fill="#0a0908"/>

  <!-- Outer circular mantra ring -->
  <circle cx="300" cy="300" r="295"
          fill="none"
          stroke="#c9985e"
          stroke-width="2"
          opacity="0.7"/>

  <!-- Mantra around the outer ring -->
  <defs>
    <path id="mantraRingMatangi"
          d="M 595,300 A 295,295 0 1,1 594.99,300"
          fill="none"/>
  </defs>
  <text font-size="14" fill="#e6c089" letter-spacing="3" opacity="0.9">
    <textPath href="#mantraRingMatangi" startOffset="0%">
      oṁ hrīṁ aiṁ mātaṅgyai namaḥ    oṁ hrīṁ aiṁ mātaṅgyai namaḥ    oṁ hrīṁ aiṁ mātaṅgyai namaḥ    oṁ hrīṁ aiṁ mātaṅgyai namaḥ    oṁ hrīṁ aiṁ mātaṅgyai namaḥ    oṁ hrīṁ aiṁ mātaṅgyai namaḥ
    </textPath>
  </text>

  <!-- Outer bhūpura (square frame with four gates) -->
  <line x1="5"   y1="5"   x2="250" y2="5"   stroke="#c9985e" stroke-width="10"/>
  <line x1="350" y1="5"   x2="595" y2="5"   stroke="#c9985e" stroke-width="10"/>
  <line x1="595" y1="5"   x2="595" y2="250" stroke="#c9985e" stroke-width="10"/>
  <line x1="595" y1="350" x2="595" y2="595" stroke="#c9985e" stroke-width="10"/>
  <line x1="595" y1="595" x2="350" y2="595" stroke="#c9985e" stroke-width="10"/>
  <line x1="250" y1="595" x2="5"   y2="595" stroke="#c9985e" stroke-width="10"/>
  <line x1="5"   y1="595" x2="5"   y2="350" stroke="#c9985e" stroke-width="10"/>
  <line x1="5"   y1="250" x2="5"   y2="5"   stroke="#c9985e" stroke-width="10"/>

  <!-- Inner bhūpura (second ring) -->
  <rect x="55" y="55" width="490" height="490"
        fill="none" stroke="#9a7340" stroke-width="1.5" opacity="0.6"/>

  <!-- 8-petalled lotus ring -->
  <g transform="translate(300, 300)">
    <g fill="none" stroke="#e6c089" stroke-width="1.8" opacity="0.9">
      <g transform="rotate(0)"><ellipse cx="0" cy="-200" rx="22" ry="55"/></g>
      <g transform="rotate(45)"><ellipse cx="0" cy="-200" rx="22" ry="55"/></g>
      <g transform="rotate(90)"><ellipse cx="0" cy="-200" rx="22" ry="55"/></g>
      <g transform="rotate(135)"><ellipse cx="0" cy="-200" rx="22" ry="55"/></g>
      <g transform="rotate(180)"><ellipse cx="0" cy="-200" rx="22" ry="55"/></g>
      <g transform="rotate(225)"><ellipse cx="0" cy="-200" rx="22" ry="55"/></g>
      <g transform="rotate(270)"><ellipse cx="0" cy="-200" rx="22" ry="55"/></g>
      <g transform="rotate(315)"><ellipse cx="0" cy="-200" rx="22" ry="55"/></g>
    </g>
  </g>

  <!-- Inverted triangle (yoni-trikoṇa) at the center -->
  <polygon points="180,220 420,220 300,430"
           fill="none" stroke="#c9985e" stroke-width="2.4" opacity="0.95"/>
  <!-- Inner concentric triangle for visual depth -->
  <polygon points="195,240 405,240 300,408"
           fill="none" stroke="#9a7340" stroke-width="1" opacity="0.5"/>

  <!-- Ucchiṣṭa motif (below the central bindu, inside the triangle) -->
  <!-- A stylized bowl with three offering-dots and two rising steam lines -->
  <g stroke="#e6c089" stroke-width="1.4" fill="none" opacity="0.85">
    <!-- Bowl rim (horizontal line) -->
    <line x1="270" y1="355" x2="330" y2="355"/>
    <!-- Bowl body (curving down) -->
    <path d="M 270,355 Q 300,385 330,355"/>
    <!-- Three offering dots inside the bowl -->
    <circle cx="288" cy="352" r="2.5" fill="#e6c089"/>
    <circle cx="300" cy="350" r="2.5" fill="#e6c089"/>
    <circle cx="312" cy="352" r="2.5" fill="#e6c089"/>
    <!-- Two rising steam wavy lines above the offering -->
    <path d="M 288,348 Q 285,338 290,328 Q 295,318 290,308"/>
    <path d="M 312,348 Q 315,338 310,328 Q 305,318 310,308"/>
  </g>

  <!-- Central bindu with the Mātaṅgī bīja aiṁ — placed in upper half of triangle -->
  <circle cx="300" cy="280" r="11" fill="#000000"/>
  <circle cx="300" cy="280" r="13" fill="none" stroke="#e6c089" stroke-width="1" opacity="0.7"/>
  <text x="300" y="286" text-anchor="middle"
        font-size="22" fill="#e6c089" font-weight="bold">aiṁ</text>

  <!-- Gate bīja labels -->
  <text x="570" y="306" text-anchor="end" font-size="22" fill="#e6c089" font-weight="bold">oṁ</text>
  <text x="306" y="585" text-anchor="middle" font-size="22" fill="#e6c089" font-weight="bold">aiṁ</text>
  <text x="30" y="306" text-anchor="start" font-size="22" fill="#e6c089" font-weight="bold">hrīṁ</text>
  <text x="306" y="30" text-anchor="middle" font-size="22" fill="#e6c089" font-weight="bold">hūṁ</text>

  <!-- Title and attribution -->
  <text x="300" y="630" text-anchor="middle"
        font-size="11" fill="#9a7340" letter-spacing="3" opacity="0.8">
    MĀTAṄGĪ YANTRA · GANDHARVA TANTRA / ŚĀKTA PRAAMODA · CAUTION: HIGH
  </text>

</svg>
