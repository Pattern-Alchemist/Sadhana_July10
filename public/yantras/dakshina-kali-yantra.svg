<?xml version="1.0" encoding="UTF-8"?>
<!--
  Dakṣiṇa Kālī Yantra — AstroKalki
  ================================
  Geometrically faithful rendering of the Dakṣiṇa Kālī yantra as specified
  in the Karpūrādi-Stotra (with Vimalānanda's commentary, Woodroffe Tantric
  Texts Series 9), the Kālī Tantra (Mālavīya Chowkhamba ed.), and the Todala
  Tantra. Dakṣiṇa Kālī is the first and most worshipped of the Daśa
  Mahāvidyās — the benevolent (dakṣiṇa) form of Kālī, her bīja krīṁ being the
  Kālī-bīja that destroys time (kāla) and its constraints.

  Construction per the source texts:
    - Outer square bhūpura with four cardinal gates
    - Eight-petalled lotus ring
    - Inverted triangle (yoni, downward-pointing) at the center — the
      signature Kālī yantra element, signifying the yoni from which she
      devours and regenerates the universe
    - Three horizontal lines inside the triangle (tripuṇḍra — Śiva's
      forehead mark, signalling Kālī's inseparability from Śiva who is
      prostrate beneath her feet in the classical iconography)
    - Garland-of-skulls motif around the triangle perimeter — the
      muṇḍamālā that she wears in the iconography (Karpūrādi-Stotra v. 4)
    - Central bindu bearing the Kālī bīja krīṁ
    - Gate bījas: East oṁ, South krīṁ, West hrīṁ, North hūṁ
    - Outer mantra ring: "oṁ krīṁ hrīṁ hūṁ dakṣiṇa kālike namaḥ"

  Note on geometry: The tripuṇḍra is rendered as three horizontal lines of
  decreasing length, mirroring the actual three-ash-line mark on Śiva's
  forehead (with the third line shortest, matching the bhasma-tripuṇḍra
  form prescribed for Śaiva dīkṣā — see Śaṭ-Cakra-Nirūpaṇa commentary).

  CAUTION: HIGH — dīkṣā-restricted Mahāvidyā practice; the Kālī-bīja is
  not to be uttered or visualised without proper initiation.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 600 600"
     width="600" height="600"
     font-family="'Noto Sans', 'Noto Serif Devanagari', serif">

  <!-- Background: lamp-soot black -->
  <rect x="0" y="0" width="600" height="600" fill="#0a0908"/>

  <!-- Outer circular mantra ring -->
  <circle cx="300" cy="300" r="295"
          fill="none"
          stroke="#c9985e"
          stroke-width="2"
          opacity="0.7"/>

  <!-- Mantra around the outer ring -->
  <defs>
    <path id="mantraRingDakshinaKali"
          d="M 595,300 A 295,295 0 1,1 594.99,300"
          fill="none"/>
  </defs>
  <text font-size="14" fill="#e6c089" letter-spacing="3" opacity="0.9">
    <textPath href="#mantraRingDakshinaKali" startOffset="0%">
      oṁ krīṁ hrīṁ hūṁ dakṣiṇa kālike namaḥ    oṁ krīṁ hrīṁ hūṁ dakṣiṇa kālike namaḥ    oṁ krīṁ hrīṁ hūṁ dakṣiṇa kālike namaḥ    oṁ krīṁ hrīṁ hūṁ dakṣiṇa kālike namaḥ
    </textPath>
  </text>

  <!-- Outer bhūpura (square frame with four gates) -->
  <line x1="5"   y1="5"   x2="250" y2="5"   stroke="#c9985e" stroke-width="10"/>
  <line x1="350" y1="5"   x2="595" y2="5"   stroke="#c9985e" stroke-width="10"/>
  <line x1="595" y1="5"   x2="595" y2="250" stroke="#c9985e" stroke-width="10"/>
  <line x1="595" y1="350" x2="595" y2="595" stroke="#c9985e" stroke-width="10"/>
  <line x1="595" y1="595" x2="350" y2="595" stroke="#c9985e" stroke-width="10"/>
  <line x1="250" y1="595" x2="5"   y2="595" stroke="#c9985e" stroke-width="10"/>
  <line x1="5"   y1="595" x2="5"   y2="350" stroke="#c9985e" stroke-width="10"/>
  <line x1="5"   y1="250" x2="5"   y2="5"   stroke="#c9985e" stroke-width="10"/>

  <!-- Inner bhūpura (second ring) -->
  <rect x="55" y="55" width="490" height="490"
        fill="none" stroke="#9a7340" stroke-width="1.5" opacity="0.6"/>

  <!-- 8-petalled lotus ring -->
  <g transform="translate(300, 300)">
    <g fill="none" stroke="#e6c089" stroke-width="1.8" opacity="0.9">
      <g transform="rotate(0)"><ellipse cx="0" cy="-200" rx="22" ry="55"/></g>
      <g transform="rotate(45)"><ellipse cx="0" cy="-200" rx="22" ry="55"/></g>
      <g transform="rotate(90)"><ellipse cx="0" cy="-200" rx="22" ry="55"/></g>
      <g transform="rotate(135)"><ellipse cx="0" cy="-200" rx="22" ry="55"/></g>
      <g transform="rotate(180)"><ellipse cx="0" cy="-200" rx="22" ry="55"/></g>
      <g transform="rotate(225)"><ellipse cx="0" cy="-200" rx="22" ry="55"/></g>
      <g transform="rotate(270)"><ellipse cx="0" cy="-200" rx="22" ry="55"/></g>
      <g transform="rotate(315)"><ellipse cx="0" cy="-200" rx="22" ry="55"/></g>
    </g>
  </g>

  <!-- Garland of skulls (muṇḍamālā) around the triangle perimeter -->
  <!-- Small circles placed along the three edges of the triangle, offset slightly outward -->
  <g fill="none" stroke="#9a7340" stroke-width="1" opacity="0.75">
    <!-- Top edge skulls (4) -->
    <circle cx="195" cy="216" r="4"/>
    <circle cx="265" cy="216" r="4"/>
    <circle cx="335" cy="216" r="4"/>
    <circle cx="405" cy="216" r="4"/>
    <!-- Left edge skulls (4), offset to the lower-left (outside the triangle) -->
    <circle cx="190" cy="252" r="4"/>
    <circle cx="218" cy="302" r="4"/>
    <circle cx="246" cy="352" r="4"/>
    <circle cx="274" cy="402" r="4"/>
    <!-- Right edge skulls (4), offset to the lower-right (outside the triangle) -->
    <circle cx="410" cy="252" r="4"/>
    <circle cx="382" cy="302" r="4"/>
    <circle cx="354" cy="352" r="4"/>
    <circle cx="326" cy="402" r="4"/>
    <!-- Vertex skulls (3) -->
    <circle cx="180" cy="222" r="4.5"/>
    <circle cx="420" cy="222" r="4.5"/>
    <circle cx="300" cy="430" r="4.5"/>
  </g>

  <!-- Inverted triangle (yoni-trikoṇa) — the signature Kālī yantra element -->
  <polygon points="180,220 420,220 300,430"
           fill="none" stroke="#c9985e" stroke-width="2.4" opacity="0.95"/>
  <!-- Inner concentric triangle for visual depth -->
  <polygon points="195,240 405,240 300,408"
           fill="none" stroke="#9a7340" stroke-width="1" opacity="0.5"/>

  <!-- Tripuṇḍra — three horizontal lines inside the triangle (Śiva's forehead mark) -->
  <!-- Signalling Kālī's inseparability from Śiva, who is prostrate beneath her feet -->
  <g stroke="#e6c089" stroke-width="2.2" opacity="0.95">
    <!-- Top line (longest) -->
    <line x1="245" y1="318" x2="355" y2="318"/>
    <!-- Middle line -->
    <line x1="252" y1="332" x2="348" y2="332"/>
    <!-- Bottom line (shortest) -->
    <line x1="262" y1="346" x2="338" y2="346"/>
  </g>

  <!-- Central bindu with the Kālī bīja krīṁ — placed in upper half of triangle -->
  <circle cx="300" cy="280" r="11" fill="#000000"/>
  <circle cx="300" cy="280" r="13" fill="none" stroke="#e6c089" stroke-width="1" opacity="0.7"/>
  <text x="300" y="286" text-anchor="middle"
        font-size="20" fill="#e6c089" font-weight="bold">krīṁ</text>

  <!-- Gate bīja labels -->
  <text x="570" y="306" text-anchor="end" font-size="22" fill="#e6c089" font-weight="bold">oṁ</text>
  <text x="306" y="585" text-anchor="middle" font-size="22" fill="#e6c089" font-weight="bold">krīṁ</text>
  <text x="30" y="306" text-anchor="start" font-size="22" fill="#e6c089" font-weight="bold">hrīṁ</text>
  <text x="306" y="30" text-anchor="middle" font-size="22" fill="#e6c089" font-weight="bold">hūṁ</text>

  <!-- Title and attribution -->
  <text x="300" y="630" text-anchor="middle"
        font-size="11" fill="#9a7340" letter-spacing="3" opacity="0.8">
    DAKṢIṆA KĀLĪ YANTRA · KARPŪRĀDI-STOTRA / KĀLĪ TANTRA · CAUTION: HIGH
  </text>

</svg>
