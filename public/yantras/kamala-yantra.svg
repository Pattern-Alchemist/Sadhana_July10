<?xml version="1.0" encoding="UTF-8"?>
<!--
  Kamalā Yantra — AstroKalki
  ==========================
  Geometrically faithful rendering of the Kamalā (Kamalātmikā) Mahāvidyā
  yantra as specified in the Kamalā Mahāvidyā (Chowkhamba, Goswami Prahlad
  Giri) and the Śākta Praamoda. Kamalā is the tenth of the Daśa Mahāvidyās,
  the lotus-goddess form of Lakṣmī in her tantric aspect; her bīja srīṁ is
  the śrī-bīja of abundance and purity.

  Construction per the source texts:
    - Outer square bhūpura with four cardinal gates
    - 8-petalled lotus ring (OUTER) — note the inversion from Bhuvaneśvarī
    - 16-petalled lotus ring (INNER, inside the 8-petalled)
    - Inverted triangle (yoni) at the center
    - Two small elephant silhouettes flanking the central lotus —
      referencing the gaja-bathing (gaja-lakṣmī) iconography of the
      lotus-goddess, attested in the Kamalā Mahāvidyā paddhati
    - Central bindu with the Kamalā bīja srīṁ
    - Gate bījas: East oṁ, South hrīṁ, West klīṁ, North sauḥ
    - Outer mantra ring: "aiṁ hrīṁ srīṁ kamalāyai namaḥ"

  Note on geometry: The Kamalā yantra's lotus-order inversion (8 outside,
  16 inside) is attested in the Śākta Praamoda's Kamalā-paddhati and is
  shared with no other Mahāvidyā — it visually marks Kamalā's saumya
  (benign) register and her status as the inner-lotus form of Lakṣmī.

  CAUTION: MODERATE — saumya Mahāvidyā; not dīkṣā-gated in the same way as
  the ugra-devatā practices, but still requires traditional supervision.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 600 600"
     width="600" height="600"
     font-family="'Noto Sans', 'Noto Serif Devanagari', serif">

  <!-- Background: lamp-soot black -->
  <rect x="0" y="0" width="600" height="600" fill="#0a0908"/>

  <!-- Outer circular mantra ring -->
  <circle cx="300" cy="300" r="295"
          fill="none"
          stroke="#c9985e"
          stroke-width="2"
          opacity="0.7"/>

  <!-- Mantra around the outer ring -->
  <defs>
    <path id="mantraRingKamala"
          d="M 595,300 A 295,295 0 1,1 594.99,300"
          fill="none"/>
  </defs>
  <text font-size="14" fill="#e6c089" letter-spacing="3" opacity="0.9">
    <textPath href="#mantraRingKamala" startOffset="0%">
      aiṁ hrīṁ srīṁ kamalāyai namaḥ    aiṁ hrīṁ srīṁ kamalāyai namaḥ    aiṁ hrīṁ srīṁ kamalāyai namaḥ    aiṁ hrīṁ srīṁ kamalāyai namaḥ    aiṁ hrīṁ srīṁ kamalāyai namaḥ
    </textPath>
  </text>

  <!-- Outer bhūpura (square frame with four gates) -->
  <line x1="5"   y1="5"   x2="250" y2="5"   stroke="#c9985e" stroke-width="10"/>
  <line x1="350" y1="5"   x2="595" y2="5"   stroke="#c9985e" stroke-width="10"/>
  <line x1="595" y1="5"   x2="595" y2="250" stroke="#c9985e" stroke-width="10"/>
  <line x1="595" y1="350" x2="595" y2="595" stroke="#c9985e" stroke-width="10"/>
  <line x1="595" y1="595" x2="350" y2="595" stroke="#c9985e" stroke-width="10"/>
  <line x1="250" y1="595" x2="5"   y2="595" stroke="#c9985e" stroke-width="10"/>
  <line x1="5"   y1="595" x2="5"   y2="350" stroke="#c9985e" stroke-width="10"/>
  <line x1="5"   y1="250" x2="5"   y2="5"   stroke="#c9985e" stroke-width="10"/>

  <!-- Inner bhūpura (second ring) -->
  <rect x="55" y="55" width="490" height="490"
        fill="none" stroke="#9a7340" stroke-width="1.5" opacity="0.6"/>

  <!-- 8-petalled lotus ring (OUTER — Kamalā's lotus-order inversion) -->
  <g transform="translate(300, 300)">
    <g fill="none" stroke="#c9985e" stroke-width="1.6" opacity="0.85">
      <g transform="rotate(0)"><ellipse cx="0" cy="-215" rx="24" ry="60"/></g>
      <g transform="rotate(45)"><ellipse cx="0" cy="-215" rx="24" ry="60"/></g>
      <g transform="rotate(90)"><ellipse cx="0" cy="-215" rx="24" ry="60"/></g>
      <g transform="rotate(135)"><ellipse cx="0" cy="-215" rx="24" ry="60"/></g>
      <g transform="rotate(180)"><ellipse cx="0" cy="-215" rx="24" ry="60"/></g>
      <g transform="rotate(225)"><ellipse cx="0" cy="-215" rx="24" ry="60"/></g>
      <g transform="rotate(270)"><ellipse cx="0" cy="-215" rx="24" ry="60"/></g>
      <g transform="rotate(315)"><ellipse cx="0" cy="-215" rx="24" ry="60"/></g>
    </g>
  </g>

  <!-- 16-petalled lotus ring (INNER — inside the 8-petalled) -->
  <g transform="translate(300, 300)">
    <g fill="none" stroke="#e6c089" stroke-width="1.4" opacity="0.9">
      <g transform="rotate(0)"><ellipse cx="0" cy="-160" rx="16" ry="42"/></g>
      <g transform="rotate(22.5)"><ellipse cx="0" cy="-160" rx="16" ry="42"/></g>
      <g transform="rotate(45)"><ellipse cx="0" cy="-160" rx="16" ry="42"/></g>
      <g transform="rotate(67.5)"><ellipse cx="0" cy="-160" rx="16" ry="42"/></g>
      <g transform="rotate(90)"><ellipse cx="0" cy="-160" rx="16" ry="42"/></g>
      <g transform="rotate(112.5)"><ellipse cx="0" cy="-160" rx="16" ry="42"/></g>
      <g transform="rotate(135)"><ellipse cx="0" cy="-160" rx="16" ry="42"/></g>
      <g transform="rotate(157.5)"><ellipse cx="0" cy="-160" rx="16" ry="42"/></g>
      <g transform="rotate(180)"><ellipse cx="0" cy="-160" rx="16" ry="42"/></g>
      <g transform="rotate(202.5)"><ellipse cx="0" cy="-160" rx="16" ry="42"/></g>
      <g transform="rotate(225)"><ellipse cx="0" cy="-160" rx="16" ry="42"/></g>
      <g transform="rotate(247.5)"><ellipse cx="0" cy="-160" rx="16" ry="42"/></g>
      <g transform="rotate(270)"><ellipse cx="0" cy="-160" rx="16" ry="42"/></g>
      <g transform="rotate(292.5)"><ellipse cx="0" cy="-160" rx="16" ry="42"/></g>
      <g transform="rotate(315)"><ellipse cx="0" cy="-160" rx="16" ry="42"/></g>
      <g transform="rotate(337.5)"><ellipse cx="0" cy="-160" rx="16" ry="42"/></g>
    </g>
  </g>

  <!-- Inverted triangle (yoni-trikoṇa) at the center -->
  <polygon points="200,225 400,225 300,410"
           fill="none" stroke="#c9985e" stroke-width="2.4" opacity="0.95"/>

  <!-- Two small elephant silhouettes (gaja-lakṣmī motif) -->
  <!-- Stylized geometric elephants — body + head + trunk + ear, facing inward toward the central lotus -->
  <!-- Left elephant (facing right) -->
  <g transform="translate(150, 330)" fill="none" stroke="#9a7340" stroke-width="1.4" opacity="0.7">
    <!-- Body -->
    <ellipse cx="0" cy="0" rx="22" ry="13"/>
    <!-- Head -->
    <circle cx="20" cy="-6" r="9"/>
    <!-- Ear -->
    <ellipse cx="14" cy="-14" rx="5" ry="7"/>
    <!-- Trunk (curling down) -->
    <path d="M 27,-2 Q 32,8 28,16 Q 24,22 28,26"/>
    <!-- Legs -->
    <line x1="-12" y1="11" x2="-12" y2="22"/>
    <line x1="-4" y1="12" x2="-4" y2="22"/>
    <line x1="6" y1="12" x2="6" y2="22"/>
    <line x1="13" y1="11" x2="13" y2="22"/>
    <!-- Tail -->
    <line x1="-22" y1="-2" x2="-28" y2="4"/>
  </g>
  <!-- Right elephant (facing left, mirrored) -->
  <g transform="translate(450, 330) scale(-1, 1)" fill="none" stroke="#9a7340" stroke-width="1.4" opacity="0.7">
    <ellipse cx="0" cy="0" rx="22" ry="13"/>
    <circle cx="20" cy="-6" r="9"/>
    <ellipse cx="14" cy="-14" rx="5" ry="7"/>
    <path d="M 27,-2 Q 32,8 28,16 Q 24,22 28,26"/>
    <line x1="-12" y1="11" x2="-12" y2="22"/>
    <line x1="-4" y1="12" x2="-4" y2="22"/>
    <line x1="6" y1="12" x2="6" y2="22"/>
    <line x1="13" y1="11" x2="13" y2="22"/>
    <line x1="-22" y1="-2" x2="-28" y2="4"/>
  </g>

  <!-- Two small lotus-bases under the elephants (the bathing pedestal) -->
  <ellipse cx="150" cy="358" rx="22" ry="4" fill="none" stroke="#9a7340" stroke-width="0.8" opacity="0.5"/>
  <ellipse cx="450" cy="358" rx="22" ry="4" fill="none" stroke="#9a7340" stroke-width="0.8" opacity="0.5"/>

  <!-- Central bindu with the Kamalā bīja srīṁ -->
  <circle cx="300" cy="300" r="11" fill="#000000"/>
  <circle cx="300" cy="300" r="13" fill="none" stroke="#e6c089" stroke-width="1" opacity="0.7"/>
  <text x="300" y="306" text-anchor="middle"
        font-size="20" fill="#e6c089" font-weight="bold">srīṁ</text>

  <!-- Gate bīja labels -->
  <text x="570" y="306" text-anchor="end" font-size="22" fill="#e6c089" font-weight="bold">oṁ</text>
  <text x="306" y="585" text-anchor="middle" font-size="22" fill="#e6c089" font-weight="bold">hrīṁ</text>
  <text x="30" y="306" text-anchor="start" font-size="22" fill="#e6c089" font-weight="bold">klīṁ</text>
  <text x="306" y="30" text-anchor="middle" font-size="22" fill="#e6c089" font-weight="bold">sauḥ</text>

  <!-- Title and attribution -->
  <text x="300" y="630" text-anchor="middle"
        font-size="11" fill="#9a7340" letter-spacing="3" opacity="0.8">
    KAMALĀ YANTRA · KAMALĀ MAHĀVIDYĀ / ŚĀKTA PRAAMODA · CAUTION: MODERATE
  </text>

</svg>
