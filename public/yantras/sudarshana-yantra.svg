<?xml version="1.0" encoding="UTF-8"?>
<!--
  Sudarśana Yantra — AstroKalki
  ==============================
  Geometric rendering of the Sudarśana yantra as described in the Ahirbudhnya
  Saṃhitā (the primary Pāñcarātra source text) and summarized in
  knowledge/tantra/sudarshana-chakra-sadhana.md, section IV.

  Construction per the source text:
    - Outer square bhūpura with four gates
    - Eight-petalled lotus at the center
    - Sudarśana bīja ( hrauṁ ) at the central bindu
    - 16-syllable Sudarśana mantra inscribed around the periphery
    - The discus (cakra) visualisation at the center, with the serrated
      flame-edge that is the iconographic mark of Sudarśana

  This is a SCHOLARLY RENDERING for contemplative study. It is not an
  activated ritual object.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 600 600"
     width="600" height="600"
     font-family="'Noto Sans', 'Noto Serif Devanagari', serif">

  <!-- Background: deep indigo per Pāñcarātra color associations -->
  <rect x="0" y="0" width="600" height="600" fill="#0a0908"/>

  <!-- Outer circular mantra ring -->
  <circle cx="300" cy="300" r="295"
          fill="none"
          stroke="#c9985e"
          stroke-width="2"
          opacity="0.7"/>

  <!-- Mantra text around the ring (the 16-syllable Sudarśana aṣṭākṣara frame) -->
  <defs>
    <path id="mantraRingSudarshana"
          d="M 595,300 A 295,295 0 1,1 594.99,300"
          fill="none"/>
  </defs>
  <text font-size="13" fill="#e6c089" letter-spacing="2" opacity="0.85">
    <textPath href="#mantraRingSudarshana" startOffset="0%">
      ॐ नमो नारायणाय    ॐ नमो नारायणाय    ॐ नमो नारायणाय
    </textPath>
  </text>

  <!-- Outer bhūpura (square frame with four gates) -->
  <!-- Same gate geometry as Preta-Sandhi: 100px gate centered on each side -->
  <!-- Top side with North gate gap -->
  <line x1="5"   y1="5"   x2="250" y2="5"   stroke="#c9985e" stroke-width="10"/>
  <line x1="350" y1="5"   x2="595" y2="5"   stroke="#c9985e" stroke-width="10"/>
  <!-- Right side with East gate gap -->
  <line x1="595" y1="5"   x2="595" y2="250" stroke="#c9985e" stroke-width="10"/>
  <line x1="595" y1="350" x2="595" y2="595" stroke="#c9985e" stroke-width="10"/>
  <!-- Bottom side with South gate gap -->
  <line x1="595" y1="595" x2="350" y2="595" stroke="#c9985e" stroke-width="10"/>
  <line x1="250" y1="595" x2="5"   y2="595" stroke="#c9985e" stroke-width="10"/>
  <!-- Left side with West gate gap -->
  <line x1="5"   y1="595" x2="5"   y2="350" stroke="#c9985e" stroke-width="10"/>
  <line x1="5"   y1="250" x2="5"   y2="5"   stroke="#c9985e" stroke-width="10"/>

  <!-- Inner square (the second ring of the bhūpura) -->
  <rect x="60" y="60" width="480" height="480"
        fill="none"
        stroke="#9a7340"
        stroke-width="1.5"
        opacity="0.6"/>

  <!-- 16-petalled lotus ring (the outer lotus, per Pāñcarātra specification) -->
  <g transform="translate(300, 300)">
    <!-- Generate 16 petals as ellipses rotated around the center -->
    <g fill="none" stroke="#c9985e" stroke-width="1.5" opacity="0.7">
      <!-- 16 petals, 22.5° apart -->
      <g transform="rotate(0)"><ellipse cx="0" cy="-200" rx="20" ry="60"/></g>
      <g transform="rotate(22.5)"><ellipse cx="0" cy="-200" rx="20" ry="60"/></g>
      <g transform="rotate(45)"><ellipse cx="0" cy="-200" rx="20" ry="60"/></g>
      <g transform="rotate(67.5)"><ellipse cx="0" cy="-200" rx="20" ry="60"/></g>
      <g transform="rotate(90)"><ellipse cx="0" cy="-200" rx="20" ry="60"/></g>
      <g transform="rotate(112.5)"><ellipse cx="0" cy="-200" rx="20" ry="60"/></g>
      <g transform="rotate(135)"><ellipse cx="0" cy="-200" rx="20" ry="60"/></g>
      <g transform="rotate(157.5)"><ellipse cx="0" cy="-200" rx="20" ry="60"/></g>
      <g transform="rotate(180)"><ellipse cx="0" cy="-200" rx="20" ry="60"/></g>
      <g transform="rotate(202.5)"><ellipse cx="0" cy="-200" rx="20" ry="60"/></g>
      <g transform="rotate(225)"><ellipse cx="0" cy="-200" rx="20" ry="60"/></g>
      <g transform="rotate(247.5)"><ellipse cx="0" cy="-200" rx="20" ry="60"/></g>
      <g transform="rotate(270)"><ellipse cx="0" cy="-200" rx="20" ry="60"/></g>
      <g transform="rotate(292.5)"><ellipse cx="0" cy="-200" rx="20" ry="60"/></g>
      <g transform="rotate(315)"><ellipse cx="0" cy="-200" rx="20" ry="60"/></g>
      <g transform="rotate(337.5)"><ellipse cx="0" cy="-200" rx="20" ry="60"/></g>
    </g>
  </g>

  <!-- 8-petalled lotus (the inner lotus, per Ahirbudhnya Saṃhitā specification) -->
  <g transform="translate(300, 300)">
    <g fill="none" stroke="#e6c089" stroke-width="2" opacity="0.9">
      <!-- 8 petals, 45° apart -->
      <g transform="rotate(0)"><ellipse cx="0" cy="-110" rx="18" ry="50"/></g>
      <g transform="rotate(45)"><ellipse cx="0" cy="-110" rx="18" ry="50"/></g>
      <g transform="rotate(90)"><ellipse cx="0" cy="-110" rx="18" ry="50"/></g>
      <g transform="rotate(135)"><ellipse cx="0" cy="-110" rx="18" ry="50"/></g>
      <g transform="rotate(180)"><ellipse cx="0" cy="-110" rx="18" ry="50"/></g>
      <g transform="rotate(225)"><ellipse cx="0" cy="-110" rx="18" ry="50"/></g>
      <g transform="rotate(270)"><ellipse cx="0" cy="-110" rx="18" ry="50"/></g>
      <g transform="rotate(315)"><ellipse cx="0" cy="-110" rx="18" ry="50"/></g>
    </g>
  </g>

  <!-- Central discus (Sudarśana cakra) — concentric rings with serrated edge -->
  <g transform="translate(300, 300)">
    <!-- Outer ring with serrated edge (the flame-edge of the discus) -->
    <circle r="60" fill="none" stroke="#e6c089" stroke-width="1.5"/>
    <!-- 24 serrations around the outer ring -->
    <g fill="#e6c089" opacity="0.8">
      <g transform="rotate(0)"><polygon points="0,-60 -3,-67 3,-67"/></g>
      <g transform="rotate(15)"><polygon points="0,-60 -3,-67 3,-67"/></g>
      <g transform="rotate(30)"><polygon points="0,-60 -3,-67 3,-67"/></g>
      <g transform="rotate(45)"><polygon points="0,-60 -3,-67 3,-67"/></g>
      <g transform="rotate(60)"><polygon points="0,-60 -3,-67 3,-67"/></g>
      <g transform="rotate(75)"><polygon points="0,-60 -3,-67 3,-67"/></g>
      <g transform="rotate(90)"><polygon points="0,-60 -3,-67 3,-67"/></g>
      <g transform="rotate(105)"><polygon points="0,-60 -3,-67 3,-67"/></g>
      <g transform="rotate(120)"><polygon points="0,-60 -3,-67 3,-67"/></g>
      <g transform="rotate(135)"><polygon points="0,-60 -3,-67 3,-67"/></g>
      <g transform="rotate(150)"><polygon points="0,-60 -3,-67 3,-67"/></g>
      <g transform="rotate(165)"><polygon points="0,-60 -3,-67 3,-67"/></g>
      <g transform="rotate(180)"><polygon points="0,-60 -3,-67 3,-67"/></g>
      <g transform="rotate(195)"><polygon points="0,-60 -3,-67 3,-67"/></g>
      <g transform="rotate(210)"><polygon points="0,-60 -3,-67 3,-67"/></g>
      <g transform="rotate(225)"><polygon points="0,-60 -3,-67 3,-67"/></g>
      <g transform="rotate(240)"><polygon points="0,-60 -3,-67 3,-67"/></g>
      <g transform="rotate(255)"><polygon points="0,-60 -3,-67 3,-67"/></g>
      <g transform="rotate(270)"><polygon points="0,-60 -3,-67 3,-67"/></g>
      <g transform="rotate(285)"><polygon points="0,-60 -3,-67 3,-67"/></g>
      <g transform="rotate(300)"><polygon points="0,-60 -3,-67 3,-67"/></g>
      <g transform="rotate(315)"><polygon points="0,-60 -3,-67 3,-67"/></g>
      <g transform="rotate(330)"><polygon points="0,-60 -3,-67 3,-67"/></g>
      <g transform="rotate(345)"><polygon points="0,-60 -3,-67 3,-67"/></g>
    </g>
    <!-- Middle ring -->
    <circle r="45" fill="none" stroke="#c9985e" stroke-width="1"/>
    <!-- Inner hub -->
    <circle r="20" fill="#c9985e" opacity="0.4"/>
    <circle r="20" fill="none" stroke="#e6c089" stroke-width="1.5"/>
  </g>

  <!-- Central bindu — the Sudarśana bīja hrauṁ -->
  <text x="300" y="307" text-anchor="middle"
        font-size="22" fill="#0a0908" font-weight="bold">hrauṁ</text>

  <!-- Gate bīja labels (inside each gate opening, facing inward) -->
  <!-- East gate — ॐ -->
  <text x="570" y="306" text-anchor="end" font-size="22" fill="#e6c089" font-weight="bold">ॐ</text>
  <!-- South gate — hrīṁ -->
  <text x="306" y="585" text-anchor="middle" font-size="22" fill="#e6c089" font-weight="bold">ह्रीं</text>
  <!-- West gate — klīṁ -->
  <text x="30" y="306" text-anchor="start" font-size="22" fill="#e6c089" font-weight="bold">क्लीं</text>
  <!-- North gate — sauḥ -->
  <text x="306" y="30" text-anchor="middle" font-size="22" fill="#e6c089" font-weight="bold">सौः</text>

  <!-- Title and attribution -->
  <text x="300" y="630" text-anchor="middle"
        font-size="11" fill="#9a7340" letter-spacing="3"
        opacity="0.8">
    SUDARŚANA YANTRA · AHIRBUDHNYA SAṂHITĀ · CAUTION: MODERATE
  </text>

</svg>
