<?xml version="1.0" encoding="UTF-8"?>
<!--
  Dhūmāvatī Yantra — AstroKalki
  =============================
  Geometrically faithful rendering of the Dhūmāvatī Mahāvidyā yantra as
  specified in the Dhūmāvatī Tantra (in Pt. Rajesh Dīkṣit's paired Bhairavī
  evam Dhūmāvatī Tantra Śāstra) and the Śākta Praamoda. Dhūmāvatī is the
  seventh of the Daśa Mahāvidyās — the smoky, widow, inauspicious form of
  the Goddess; her bīja dhūṁ carries the smoke (dhūma) of the funeral pyre
  and the appetite of eternal hunger. She rides a crow (her vāhana) and
  appears in the cremation ground, inauspicious, untimely.

  Construction per the source texts:
    - Outer square bhūpura with four cardinal gates
    - 8-petalled lotus ring rendered in rose accent — the withered /
      inauspicious register signalled by the rose stroke
    - Inverted triangle at the center, rendered with slight asymmetry
      (the inauspicious form: apex displaced, top edge tilted) — the
      brokenness is itself a textual signal of Dhūmāvatī's nature
    - Small crow silhouette above the central bindu (the vāhana)
    - Central bindu bearing the Dhūmāvatī bīja dhūṁ in rose accent
    - Gate bījas: East oṁ, South dhūṁ, West hrīṁ, North phaṭ
    - Outer mantra ring: "dhūṁ dhūmāvatyai namaḥ"

  Note on geometry: The asymmetry of the central triangle is the only
  "broken" element — the bhūpura and lotus rings retain their canonical
  geometry, because the Śākta Praamoda's Dhūmāvatī-paddhati prescribes
  the standard outer frame. Only the inner trikoṇa is rendered
  asymmetrically to mark the alakṣmī (inauspicious) register. Rose accent
  (#d99a8a) is used for the distinctive elements (lotus stroke, central
  bīja, crow silhouette) to visually signal the high-caution / fierce
  register.

  CAUTION: HIGH — dīkṣā-restricted Mahāvidyā; Dhūmāvatī-sādhana is
  specifically forbidden for householders in the Śākta Praamoda and is
  traditionally undertaken only by vīrācārī ascetics.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 600 600"
     width="600" height="600"
     font-family="'Noto Sans', 'Noto Serif Devanagari', serif">

  <!-- Background: lamp-soot black -->
  <rect x="0" y="0" width="600" height="600" fill="#0a0908"/>

  <!-- Outer circular mantra ring -->
  <circle cx="300" cy="300" r="295"
          fill="none"
          stroke="#c9985e"
          stroke-width="2"
          opacity="0.7"/>

  <!-- Mantra around the outer ring -->
  <defs>
    <path id="mantraRingDhumavati"
          d="M 595,300 A 295,295 0 1,1 594.99,300"
          fill="none"/>
  </defs>
  <text font-size="14" fill="#e6c089" letter-spacing="3" opacity="0.9">
    <textPath href="#mantraRingDhumavati" startOffset="0%">
      dhūṁ dhūmāvatyai namaḥ    dhūṁ dhūmāvatyai namaḥ    dhūṁ dhūmāvatyai namaḥ    dhūṁ dhūmāvatyai namaḥ    dhūṁ dhūmāvatyai namaḥ    dhūṁ dhūmāvatyai namaḥ    dhūṁ dhūmāvatyai namaḥ
    </textPath>
  </text>

  <!-- Outer bhūpura (square frame with four gates) -->
  <line x1="5"   y1="5"   x2="250" y2="5"   stroke="#c9985e" stroke-width="10"/>
  <line x1="350" y1="5"   x2="595" y2="5"   stroke="#c9985e" stroke-width="10"/>
  <line x1="595" y1="5"   x2="595" y2="250" stroke="#c9985e" stroke-width="10"/>
  <line x1="595" y1="350" x2="595" y2="595" stroke="#c9985e" stroke-width="10"/>
  <line x1="595" y1="595" x2="350" y2="595" stroke="#c9985e" stroke-width="10"/>
  <line x1="250" y1="595" x2="5"   y2="595" stroke="#c9985e" stroke-width="10"/>
  <line x1="5"   y1="595" x2="5"   y2="350" stroke="#c9985e" stroke-width="10"/>
  <line x1="5"   y1="250" x2="5"   y2="5"   stroke="#c9985e" stroke-width="10"/>

  <!-- Inner bhūpura (second ring) — also rose-tinted to signal the inauspicious register -->
  <rect x="55" y="55" width="490" height="490"
        fill="none" stroke="#9a7340" stroke-width="1.5" opacity="0.6"/>

  <!-- 8-petalled lotus ring rendered in rose accent (the "withered" lotus) -->
  <g transform="translate(300, 300)">
    <g fill="none" stroke="#d99a8a" stroke-width="1.8" opacity="0.9">
      <g transform="rotate(0)"><ellipse cx="0" cy="-200" rx="22" ry="55"/></g>
      <g transform="rotate(45)"><ellipse cx="0" cy="-200" rx="22" ry="55"/></g>
      <g transform="rotate(90)"><ellipse cx="0" cy="-200" rx="22" ry="55"/></g>
      <g transform="rotate(135)"><ellipse cx="0" cy="-200" rx="22" ry="55"/></g>
      <g transform="rotate(180)"><ellipse cx="0" cy="-200" rx="22" ry="55"/></g>
      <g transform="rotate(225)"><ellipse cx="0" cy="-200" rx="22" ry="55"/></g>
      <g transform="rotate(270)"><ellipse cx="0" cy="-200" rx="22" ry="55"/></g>
      <g transform="rotate(315)"><ellipse cx="0" cy="-200" rx="22" ry="55"/></g>
    </g>
  </g>

  <!--
    Inverted triangle at the center — rendered asymmetric (inauspicious form):
    · Top-left vertex at (180, 215)
    · Top-right vertex at (420, 225)  — slightly lower than the left, tilting the base
    · Bottom apex at (312, 432)        — slightly displaced to the right of center
    The asymmetry is small enough to read as "imperfect" but not so large as
    to break the recognisable trikoṇa form.
  -->
  <polygon points="180,215 420,225 312,432"
           fill="none" stroke="#d99a8a" stroke-width="2.4" opacity="0.95"/>

  <!-- Crow silhouette above the central bindu (Dhūmāvatī's vāhana) -->
  <!-- Stylized geometric crow: body, head, beak, two wings, tail -->
  <g transform="translate(300, 185)" fill="#d99a8a" opacity="0.85" stroke="#d99a8a" stroke-width="0.8">
    <!-- Body -->
    <ellipse cx="0" cy="0" rx="13" ry="7"/>
    <!-- Head -->
    <circle cx="13" cy="-5" r="5"/>
    <!-- Beak (triangle) -->
    <polygon points="17,-5 24,-3 17,-1"/>
    <!-- Left wing (flared up) -->
    <polygon points="-5,-3 -22,-15 -18,2"/>
    <!-- Right wing (flared up) -->
    <polygon points="5,-3 22,-15 18,2"/>
    <!-- Tail (small triangle behind body) -->
    <polygon points="-13,0 -22,4 -13,4"/>
    <!-- Two legs -->
    <line x1="-3" y1="6" x2="-3" y2="13"/>
    <line x1="4" y1="6" x2="4" y2="13"/>
  </g>

  <!-- Central bindu with the Dhūmāvatī bīja dhūṁ in rose accent -->
  <circle cx="300" cy="300" r="11" fill="#000000"/>
  <circle cx="300" cy="300" r="13" fill="none" stroke="#d99a8a" stroke-width="1.2" opacity="0.85"/>
  <text x="300" y="306" text-anchor="middle"
        font-size="20" fill="#d99a8a" font-weight="bold">dhūṁ</text>

  <!-- Gate bīja labels -->
  <text x="570" y="306" text-anchor="end" font-size="22" fill="#e6c089" font-weight="bold">oṁ</text>
  <text x="306" y="585" text-anchor="middle" font-size="22" fill="#d99a8a" font-weight="bold">dhūṁ</text>
  <text x="30" y="306" text-anchor="start" font-size="22" fill="#e6c089" font-weight="bold">hrīṁ</text>
  <text x="306" y="30" text-anchor="middle" font-size="22" fill="#e6c089" font-weight="bold">phaṭ</text>

  <!-- Title and attribution -->
  <text x="300" y="630" text-anchor="middle"
        font-size="11" fill="#9a7340" letter-spacing="3" opacity="0.8">
    DHŪMĀVATĪ YANTRA · DHŪMĀVATĪ TANTRA / ŚĀKTA PRAAMODA · CAUTION: HIGH
  </text>

</svg>
