<?xml version="1.0" encoding="UTF-8"?>
<!--
  Bagalāmukhī Yantra — AstroKalki
  ================================
  Geometrically faithful rendering of the Bagalāmukhī Mahāvidyā yantra as
  specified in the Todala Tantra, the Rudrayāmala, and the Pitāmbarā
  Peeth recension of the Bagalāmukhī Rahasya. Bagalāmukhī is the eighth
  of the Daśa Mahāvidyās — the golden (pitāmbarā) goddess of stambhana
  (paralysis/silencing), whose bīja hlīṁ is the "weapon-bīja" that
  freezes the speech, motion, and intent of adversaries. Her iconography
  depicts her pulling the tongue of the demon Mādhura with her left hand
  — the yantra's central tongue-pulling motif references this directly.

  Construction per the source texts:
    - Outer square bhūpura with four cardinal gates
    - 8-petalled lotus ring (rendered in bright gold #e6c089 — Bagalāmukhī
      is the "golden goddess", Pitāmbarā, and her yantra prescribes gold
      throughout)
    - Inverted triangle (yoni, downward-pointing) at the center
    - Tongue-pulling motif inside the triangle: a horizontal tongue-shape
      extending rightward, with a stylised hand (palm + fingers + thumb)
      gripping the tongue tip — referencing the Mādhura-tongue iconography
    - Central bindu bearing the Bagalāmukhī bīja hlīṁ (bright gold — the
      stambhana-bīja, the silencing-seed)
    - Gate bījas: East oṁ, South hlīṁ, West hrīṁ, North phaṭ
    - Outer mantra ring: "oṁ hlīṁ bagalāmukhī devyai namaḥ"

  Note on geometry: The tongue-pulling motif is rendered as a simple
  geometric abstraction — an elongated horizontal ellipse for the tongue
  (with a small forked tip at the gripping end, the canonical iconographic
  detail), and a small circle (palm) with three short finger-lines and a
  thumb-line for the gripping hand. The motif is positioned below the
  central bindu, in the lower half of the inverted yoni-triangle, so that
  the tongue points toward the gripper hand. This is consistent with the
  Pitāmbarā Peeth recension's prescription that the sādhaka visualise the
  "tongue-grasp" (jihvā-grahaṇa) within the yoni-triangle of the yantra.

  CAUTION: HIGH — dīkṣā-restricted Mahāvidyā; the stambhana-bīja hlīṁ is
  not to be uttered or visualised without proper initiation. Bagalāmukhī
  sādhana of the stambhana (adverse-action) variety is forbidden.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 600 600"
     width="600" height="600"
     font-family="'Noto Sans', 'Noto Serif Devanagari', serif">

  <!-- Background: lamp-soot black -->
  <rect x="0" y="0" width="600" height="600" fill="#0a0908"/>

  <!-- Outer circular mantra ring -->
  <circle cx="300" cy="300" r="295"
          fill="none"
          stroke="#c9985e"
          stroke-width="2"
          opacity="0.7"/>

  <!-- Mantra around the outer ring -->
  <defs>
    <path id="mantraRingBagalamukhi"
          d="M 595,300 A 295,295 0 1,1 594.99,300"
          fill="none"/>
  </defs>
  <text font-size="14" fill="#e6c089" letter-spacing="3" opacity="0.9">
    <textPath href="#mantraRingBagalamukhi" startOffset="0%">
      oṁ hlīṁ bagalāmukhī devyai namaḥ    oṁ hlīṁ bagalāmukhī devyai namaḥ    oṁ hlīṁ bagalāmukhī devyai namaḥ    oṁ hlīṁ bagalāmukhī devyai namaḥ
    </textPath>
  </text>

  <!-- Outer bhūpura (square frame with four cardinal gates) -->
  <line x1="5"   y1="5"   x2="250" y2="5"   stroke="#c9985e" stroke-width="10"/>
  <line x1="350" y1="5"   x2="595" y2="5"   stroke="#c9985e" stroke-width="10"/>
  <line x1="595" y1="5"   x2="595" y2="250" stroke="#c9985e" stroke-width="10"/>
  <line x1="595" y1="350" x2="595" y2="595" stroke="#c9985e" stroke-width="10"/>
  <line x1="595" y1="595" x2="350" y2="595" stroke="#c9985e" stroke-width="10"/>
  <line x1="250" y1="595" x2="5"   y2="595" stroke="#c9985e" stroke-width="10"/>
  <line x1="5"   y1="595" x2="5"   y2="350" stroke="#c9985e" stroke-width="10"/>
  <line x1="5"   y1="250" x2="5"   y2="5"   stroke="#c9985e" stroke-width="10"/>

  <!-- Inner bhūpura (second ring) -->
  <rect x="55" y="55" width="490" height="490"
        fill="none" stroke="#9a7340" stroke-width="1.5" opacity="0.6"/>

  <!-- 8-petalled lotus ring (bright gold — Bagalāmukhī is the golden goddess) -->
  <g transform="translate(300, 300)">
    <g fill="none" stroke="#e6c089" stroke-width="1.9" opacity="0.95">
      <g transform="rotate(0)"><ellipse cx="0" cy="-200" rx="22" ry="55"/></g>
      <g transform="rotate(45)"><ellipse cx="0" cy="-200" rx="22" ry="55"/></g>
      <g transform="rotate(90)"><ellipse cx="0" cy="-200" rx="22" ry="55"/></g>
      <g transform="rotate(135)"><ellipse cx="0" cy="-200" rx="22" ry="55"/></g>
      <g transform="rotate(180)"><ellipse cx="0" cy="-200" rx="22" ry="55"/></g>
      <g transform="rotate(225)"><ellipse cx="0" cy="-200" rx="22" ry="55"/></g>
      <g transform="rotate(270)"><ellipse cx="0" cy="-200" rx="22" ry="55"/></g>
      <g transform="rotate(315)"><ellipse cx="0" cy="-200" rx="22" ry="55"/></g>
    </g>
  </g>

  <!-- Inverted triangle (yoni-trikoṇa) -->
  <polygon points="180,220 420,220 300,430"
           fill="none" stroke="#c9985e" stroke-width="2.4" opacity="0.95"/>
  <!-- Inner concentric triangle for visual depth -->
  <polygon points="195,240 405,240 300,408"
           fill="none" stroke="#9a7340" stroke-width="1" opacity="0.5"/>

  <!--
    Tongue-pulling motif inside the triangle (the Mādhura-tongue iconography).
    Rendered as a horizontal tongue-ellipse with a small forked tip at the
    gripping end, plus a stylised hand (palm circle + 3 finger-lines + 1 thumb-line)
    gripping the tongue tip. Positioned in the lower half of the triangle.
  -->
  <g>
    <!-- Tongue: horizontal ellipse -->
    <ellipse cx="291" cy="328" rx="28" ry="6"
             fill="none" stroke="#e6c089" stroke-width="2" opacity="0.95"/>
    <!-- Forked tongue tip (right end): two short diverging lines -->
    <line x1="319" y1="328" x2="325" y2="322" stroke="#e6c089" stroke-width="2" opacity="0.95"/>
    <line x1="319" y1="328" x2="325" y2="334" stroke="#e6c089" stroke-width="2" opacity="0.95"/>

    <!-- Hand: palm (circle) at the right end of the tongue -->
    <circle cx="335" cy="328" r="8" fill="none" stroke="#e6c089" stroke-width="2" opacity="0.95"/>
    <!-- Three fingers gripping the tongue tip (short lines on left side of palm) -->
    <line x1="329" y1="324" x2="324" y2="324" stroke="#e6c089" stroke-width="1.6" opacity="0.9"/>
    <line x1="329" y1="328" x2="324" y2="328" stroke="#e6c089" stroke-width="1.6" opacity="0.9"/>
    <line x1="329" y1="332" x2="324" y2="332" stroke="#e6c089" stroke-width="1.6" opacity="0.9"/>
    <!-- Thumb (short line above the palm) -->
    <line x1="338" y1="320" x2="342" y2="316" stroke="#e6c089" stroke-width="1.6" opacity="0.9"/>
    <!-- Wrist (short line below the palm) -->
    <line x1="335" y1="336" x2="335" y2="342" stroke="#e6c089" stroke-width="1.6" opacity="0.9"/>
  </g>

  <!-- Central bindu with the Bagalāmukhī bīja hlīṁ (bright gold — the stambhana-bīja) -->
  <circle cx="300" cy="278" r="11" fill="#000000"/>
  <circle cx="300" cy="278" r="13" fill="none" stroke="#e6c089" stroke-width="1.2" opacity="0.85"/>
  <text x="300" y="284" text-anchor="middle"
        font-size="20" fill="#e6c089" font-weight="bold">hlīṁ</text>

  <!-- Gate bīja labels -->
  <text x="570" y="306" text-anchor="end" font-size="22" fill="#e6c089" font-weight="bold">oṁ</text>
  <text x="306" y="585" text-anchor="middle" font-size="22" fill="#e6c089" font-weight="bold">hlīṁ</text>
  <text x="30" y="306" text-anchor="start" font-size="22" fill="#e6c089" font-weight="bold">hrīṁ</text>
  <text x="306" y="30" text-anchor="middle" font-size="22" fill="#e6c089" font-weight="bold">phaṭ</text>

  <!-- Title and attribution -->
  <text x="300" y="630" text-anchor="middle"
        font-size="11" fill="#9a7340" letter-spacing="3" opacity="0.8">
    BAGALĀMUKHĪ YANTRA · TODALA TANTRA / RUDRAYĀMALA · CAUTION: HIGH
  </text>

</svg>
