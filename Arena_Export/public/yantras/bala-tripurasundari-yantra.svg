<?xml version="1.0" encoding="UTF-8"?>
<!--
  Bālā Tripurasundarī Yantra — AstroKalki
  ========================================
  Geometrically faithful rendering of the Bālā Tripurasundarī yantra as
  specified in the Vāmakeśvara Tantra and codified in the Paraśurāma
  Kalpa Sūtra. Bālā is the entry-level (bālā) form of Tripurasundarī — the
  "child-goddess" of the Śrī Vidyā tradition whose three-bīja-jāla
  (aim̐ hrīṁ srīṁ) is the first Śrī Vidyā dīkṣā given to the sādhaka.
  Her bīja aim̐ (the vāg-bīja) is rendered in the cyan Śrī Vidyā accent
  to mark the entry-level register of the tradition.

  Construction per the source texts:
    - Outer square bhūpura with four cardinal gates
    - Three concentric circles (trivalaya — the three "veils") inside the
      bhūpura, replacing the full Śrī Cakra's 16+8 lotus rings
    - 8-petalled lotus (aṣṭa-dala-padma — the simplified single-lotus form
      prescribed for the Bālā entry-level yantra)
    - Three interlocking triangles (simplified navayoni): two upward Śiva
      triangles (gold) + one downward Śakti triangle (cyan) — forming a
      simplified yoni at the center. This is the Bālā-level reduction of
      the full Śrī Cakra's 4+5 = 9-triangle navayoni.
    - Central bindu bearing the Bālā bīja aim̐ (cyan accent — the Śrī
      Vidyā entry-level color)
    - Gate bījas (Śrī Vidyā convention): East oṁ, South hrīṁ, West klīṁ,
      North sauḥ
    - Outer mantra ring: "oṁ aim̐ hrīṁ srīṁ bālāyai namaḥ"

  Note on geometry: The Bālā yantra is the simplest Śrī Cakra variant —
  the Vāmakeśvara Tantra prescribes it for the first Śrī Vidyā dīkṣā,
  with the full navayoni reserved for the Mahā-Ṣoḍaśī stage. The three-
  triangle simplified yoni (2 Śiva + 1 Śakti) preserves the apex-base
  interlock of the outermost pair — the central hexagonal yoni — while
  omitting the inner triangle layers. This is consistent with the
  Paraśurāma Kalpa Sūtra's prescription that the Bālā sādhaka visualises
  only the central trikoṇa + bindu, with the full 43-triangle pattern
  reserved for later stages.

  CAUTION: HIGH — dīkṣā-restricted Śrī Vidyā practice; even the Bālā
  entry-level form requires initiation. Do not reproduce as a ritual
  object without proper dīkṣā and the guru's instruction.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 600 600"
     width="600" height="600"
     font-family="'Noto Sans', 'Noto Serif Devanagari', serif">

  <!-- Background: lamp-soot black -->
  <rect x="0" y="0" width="600" height="600" fill="#0a0908"/>

  <!-- Outer circular mantra ring -->
  <circle cx="300" cy="300" r="295"
          fill="none"
          stroke="#c9985e"
          stroke-width="2"
          opacity="0.7"/>

  <!-- Mantra around the outer ring -->
  <defs>
    <path id="mantraRingBala"
          d="M 595,300 A 295,295 0 1,1 594.99,300"
          fill="none"/>
  </defs>
  <text font-size="14" fill="#e6c089" letter-spacing="3" opacity="0.9">
    <textPath href="#mantraRingBala" startOffset="0%">
      oṁ aim̐ hrīṁ srīṁ bālāyai namaḥ    oṁ aim̐ hrīṁ srīṁ bālāyai namaḥ    oṁ aim̐ hrīṁ srīṁ bālāyai namaḥ    oṁ aim̐ hrīṁ srīṁ bālāyai namaḥ
    </textPath>
  </text>

  <!-- Outer bhūpura (square frame with four cardinal gates) -->
  <line x1="5"   y1="5"   x2="250" y2="5"   stroke="#c9985e" stroke-width="10"/>
  <line x1="350" y1="5"   x2="595" y2="5"   stroke="#c9985e" stroke-width="10"/>
  <line x1="595" y1="5"   x2="595" y2="250" stroke="#c9985e" stroke-width="10"/>
  <line x1="595" y1="350" x2="595" y2="595" stroke="#c9985e" stroke-width="10"/>
  <line x1="595" y1="595" x2="350" y2="595" stroke="#c9985e" stroke-width="10"/>
  <line x1="250" y1="595" x2="5"   y2="595" stroke="#c9985e" stroke-width="10"/>
  <line x1="5"   y1="595" x2="5"   y2="350" stroke="#c9985e" stroke-width="10"/>
  <line x1="5"   y1="250" x2="5"   y2="5"   stroke="#c9985e" stroke-width="10"/>

  <!-- Inner bhūpura (second ring) -->
  <rect x="55" y="55" width="490" height="490"
        fill="none" stroke="#9a7340" stroke-width="1.5" opacity="0.6"/>

  <!-- Three concentric circles (the trivalaya — three "veils") -->
  <!-- Simplified from the full Śrī Cakra's trivalaya + 16-petal lotus, per Bālā prescription -->
  <circle cx="300" cy="300" r="240" fill="none" stroke="#c9985e" stroke-width="1.5" opacity="0.7"/>
  <circle cx="300" cy="300" r="232" fill="none" stroke="#9a7340" stroke-width="1"   opacity="0.6"/>
  <circle cx="300" cy="300" r="224" fill="none" stroke="#c9985e" stroke-width="1"   opacity="0.5"/>

  <!-- 8-petalled lotus (aṣṭa-dala-padma) — the simplified single-lotus form -->
  <!-- Replaces the full Śrī Cakra's 16+8 double-lotus pattern -->
  <g transform="translate(300, 300)">
    <g fill="none" stroke="#e6c089" stroke-width="1.8" opacity="0.9">
      <g transform="rotate(0)"><ellipse cx="0" cy="-185" rx="20" ry="55"/></g>
      <g transform="rotate(45)"><ellipse cx="0" cy="-185" rx="20" ry="55"/></g>
      <g transform="rotate(90)"><ellipse cx="0" cy="-185" rx="20" ry="55"/></g>
      <g transform="rotate(135)"><ellipse cx="0" cy="-185" rx="20" ry="55"/></g>
      <g transform="rotate(180)"><ellipse cx="0" cy="-185" rx="20" ry="55"/></g>
      <g transform="rotate(225)"><ellipse cx="0" cy="-185" rx="20" ry="55"/></g>
      <g transform="rotate(270)"><ellipse cx="0" cy="-185" rx="20" ry="55"/></g>
      <g transform="rotate(315)"><ellipse cx="0" cy="-185" rx="20" ry="55"/></g>
    </g>
  </g>

  <!-- Inner ring holding the simplified navayoni -->
  <circle cx="300" cy="300" r="115" fill="none" stroke="#9a7340" stroke-width="1" opacity="0.5"/>

  <!--
    Simplified navayoni — three interlocking triangles (the Bālā reduction
    of the full Śrī Cakra's 4+5 = 9-triangle navayoni).
    Two upward (Śiva) triangles in gold (#c9985e).
    One downward (Śakti) triangle in cyan (#6fc7bd) — the Śrī Vidyā accent.

    The outer Śiva triangle and the Śakti triangle form the hexagonal yoni
    at the center via apex-base interlock. The inner Śiva triangle is
    nested concentrically inside the outer one.
  -->

  <!-- Upward (Śiva) triangle 1 — outer, gold -->
  <polygon points="300,135 145,455 455,455"
           fill="none" stroke="#c9985e" stroke-width="2.2" opacity="0.95"/>

  <!-- Downward (Śakti) triangle — cyan, interlocks with outer Śiva triangle to form the hexagonal yoni -->
  <polygon points="160,225 440,225 300,455"
           fill="none" stroke="#6fc7bd" stroke-width="2.2" opacity="0.95"/>

  <!-- Upward (Śiva) triangle 2 — inner, gold, nested concentrically -->
  <polygon points="300,205 220,370 380,370"
           fill="none" stroke="#c9985e" stroke-width="1.6" opacity="0.9"/>

  <!-- Central bindu — solid black dot at the center of the hexagonal yoni -->
  <!-- Bearing the Bālā bīja aim̐ in cyan (the Śrī Vidyā entry-level accent) -->
  <circle cx="300" cy="315" r="11" fill="#000000"/>
  <circle cx="300" cy="315" r="13" fill="none" stroke="#6fc7bd" stroke-width="1" opacity="0.8"/>
  <circle cx="300" cy="315" r="15" fill="none" stroke="#e6c089" stroke-width="0.5" opacity="0.5"/>
  <text x="300" y="321" text-anchor="middle"
        font-size="16" fill="#6fc7bd" font-weight="bold">aim̐</text>

  <!-- Gate bīja labels (Śrī Vidyā convention) -->
  <!-- East gate — oṁ -->
  <text x="570" y="306" text-anchor="end" font-size="22" fill="#e6c089" font-weight="bold">oṁ</text>
  <!-- South gate — hrīṁ -->
  <text x="306" y="585" text-anchor="middle" font-size="22" fill="#e6c089" font-weight="bold">hrīṁ</text>
  <!-- West gate — klīṁ -->
  <text x="30" y="306" text-anchor="start" font-size="22" fill="#e6c089" font-weight="bold">klīṁ</text>
  <!-- North gate — sauḥ -->
  <text x="306" y="30" text-anchor="middle" font-size="22" fill="#e6c089" font-weight="bold">sauḥ</text>

  <!-- Title and attribution -->
  <text x="300" y="630" text-anchor="middle"
        font-size="11" fill="#9a7340" letter-spacing="3" opacity="0.8">
    BĀLĀ TRIPURASUNDARĪ YANTRA · VĀMAKEŚVARA TANTRA / PARAŚURĀMA KALPA SŪTRA · CAUTION: HIGH
  </text>

</svg>
