<?xml version="1.0" encoding="UTF-8"?>
<!--
  Tārā (Ugra) Yantra — AstroKalki
  ===============================
  Geometrically faithful rendering of the Ugra-Tārā yantra as specified in
  the Bṛhad Nīla Tantra (Kak & Shastri 1938 ed. + DLI/JaiGyan + Madhusudan
  Kaul Chowkhamba editions) and the Tārā Tantra. Tārā is the second of the
  Daśa Mahāvidyās — the "savioress" who guides across the ocean of saṁsāra,
  visualised in her ugra (fierce) form as blue-black, standing on a corpse
  (śava), wearing a garland of severed heads (muṇḍamālā).

  Construction per the source texts:
    - Outer square bhūpura with four cardinal gates
    - Eight-petalled lotus ring
    - Inverted triangle (yoni) at the center — distinct from Kālī's by the
      presence of the śava (corpse) figure inside
    - Inside the triangle, a small śava (corpse) silhouette — a simple
      horizontal figure — referencing Tārā's iconography of standing upon
      the corpse (the Bṛhad Nīla Tantra dhyāna-śloka specifies "śavopari
      tiṣṭhati")
    - Garland of severed heads (muṇḍamālā) around the triangle perimeter —
      rendered as small head-shapes with eye-dots, distinct from Kālī's
      bare skull-garland
    - Central bindu bearing the Tārā bīja hrīṁ (with the strīṁ bīja at
      the South gate, per the Bṛhad Nīla Tantra's Tārā-bīja prescription)
    - Gate bījas: East oṁ, South strīṁ, West hrīṁ, North hūṁ
    - Outer mantra ring: "oṁ hrīṁ strīṁ hūṁ phaṭ"

  Note on geometry: The śava silhouette is rendered as a stylised supine
  figure — a horizontal body line with a head circle at one end and four
  short limbs — laid horizontally inside the lower half of the triangle.
  This is the iconographic mark that distinguishes the Tārā yantra from
  the Kālī yantra (which has the tripuṇḍra in the same position).

  CAUTION: HIGH — dīkṣā-restricted Mahāvidyā; the Tārā-bīja is not to be
  uttered or visualised without proper initiation. The Bṛhad Nīla Tantra
  itself warns that the uninitiated practitioner who pronounces the bīja
  incurs severe consequences (Nīla Tantra 1.36-38).
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 600 600"
     width="600" height="600"
     font-family="'Noto Sans', 'Noto Serif Devanagari', serif">

  <!-- Background: lamp-soot black -->
  <rect x="0" y="0" width="600" height="600" fill="#0a0908"/>

  <!-- Outer circular mantra ring -->
  <circle cx="300" cy="300" r="295"
          fill="none"
          stroke="#c9985e"
          stroke-width="2"
          opacity="0.7"/>

  <!-- Mantra around the outer ring -->
  <defs>
    <path id="mantraRingTaraUgra"
          d="M 595,300 A 295,295 0 1,1 594.99,300"
          fill="none"/>
  </defs>
  <text font-size="14" fill="#e6c089" letter-spacing="3" opacity="0.9">
    <textPath href="#mantraRingTaraUgra" startOffset="0%">
      oṁ hrīṁ strīṁ hūṁ phaṭ    oṁ hrīṁ strīṁ hūṁ phaṭ    oṁ hrīṁ strīṁ hūṁ phaṭ    oṁ hrīṁ strīṁ hūṁ phaṭ    oṁ hrīṁ strīṁ hūṁ phaṭ    oṁ hrīṁ strīṁ hūṁ phaṭ    oṁ hrīṁ strīṁ hūṁ phaṭ
    </textPath>
  </text>

  <!-- Outer bhūpura (square frame with four gates) -->
  <line x1="5"   y1="5"   x2="250" y2="5"   stroke="#c9985e" stroke-width="10"/>
  <line x1="350" y1="5"   x2="595" y2="5"   stroke="#c9985e" stroke-width="10"/>
  <line x1="595" y1="5"   x2="595" y2="250" stroke="#c9985e" stroke-width="10"/>
  <line x1="595" y1="350" x2="595" y2="595" stroke="#c9985e" stroke-width="10"/>
  <line x1="595" y1="595" x2="350" y2="595" stroke="#c9985e" stroke-width="10"/>
  <line x1="250" y1="595" x2="5"   y2="595" stroke="#c9985e" stroke-width="10"/>
  <line x1="5"   y1="595" x2="5"   y2="350" stroke="#c9985e" stroke-width="10"/>
  <line x1="5"   y1="250" x2="5"   y2="5"   stroke="#c9985e" stroke-width="10"/>

  <!-- Inner bhūpura (second ring) -->
  <rect x="55" y="55" width="490" height="490"
        fill="none" stroke="#9a7340" stroke-width="1.5" opacity="0.6"/>

  <!-- 8-petalled lotus ring -->
  <g transform="translate(300, 300)">
    <g fill="none" stroke="#e6c089" stroke-width="1.8" opacity="0.9">
      <g transform="rotate(0)"><ellipse cx="0" cy="-200" rx="22" ry="55"/></g>
      <g transform="rotate(45)"><ellipse cx="0" cy="-200" rx="22" ry="55"/></g>
      <g transform="rotate(90)"><ellipse cx="0" cy="-200" rx="22" ry="55"/></g>
      <g transform="rotate(135)"><ellipse cx="0" cy="-200" rx="22" ry="55"/></g>
      <g transform="rotate(180)"><ellipse cx="0" cy="-200" rx="22" ry="55"/></g>
      <g transform="rotate(225)"><ellipse cx="0" cy="-200" rx="22" ry="55"/></g>
      <g transform="rotate(270)"><ellipse cx="0" cy="-200" rx="22" ry="55"/></g>
      <g transform="rotate(315)"><ellipse cx="0" cy="-200" rx="22" ry="55"/></g>
    </g>
  </g>

  <!-- Garland of severed heads (muṇḍamālā) around the triangle perimeter -->
  <!-- Rendered as small head-shaped ovals with two eye-dots, distinct from Kālī's bare skulls -->
  <g fill="none" stroke="#9a7340" stroke-width="1" opacity="0.8">
    <!-- Top edge severed heads (4) -->
    <ellipse cx="195" cy="216" rx="5" ry="4"/><circle cx="193" cy="216" r="0.6" fill="#9a7340"/><circle cx="197" cy="216" r="0.6" fill="#9a7340"/>
    <ellipse cx="265" cy="216" rx="5" ry="4"/><circle cx="263" cy="216" r="0.6" fill="#9a7340"/><circle cx="267" cy="216" r="0.6" fill="#9a7340"/>
    <ellipse cx="335" cy="216" rx="5" ry="4"/><circle cx="333" cy="216" r="0.6" fill="#9a7340"/><circle cx="337" cy="216" r="0.6" fill="#9a7340"/>
    <ellipse cx="405" cy="216" rx="5" ry="4"/><circle cx="403" cy="216" r="0.6" fill="#9a7340"/><circle cx="407" cy="216" r="0.6" fill="#9a7340"/>
    <!-- Left edge severed heads (4) -->
    <ellipse cx="190" cy="252" rx="5" ry="4"/><circle cx="188" cy="252" r="0.6" fill="#9a7340"/><circle cx="192" cy="252" r="0.6" fill="#9a7340"/>
    <ellipse cx="218" cy="302" rx="5" ry="4"/><circle cx="216" cy="302" r="0.6" fill="#9a7340"/><circle cx="220" cy="302" r="0.6" fill="#9a7340"/>
    <ellipse cx="246" cy="352" rx="5" ry="4"/><circle cx="244" cy="352" r="0.6" fill="#9a7340"/><circle cx="248" cy="352" r="0.6" fill="#9a7340"/>
    <ellipse cx="274" cy="402" rx="5" ry="4"/><circle cx="272" cy="402" r="0.6" fill="#9a7340"/><circle cx="276" cy="402" r="0.6" fill="#9a7340"/>
    <!-- Right edge severed heads (4) -->
    <ellipse cx="410" cy="252" rx="5" ry="4"/><circle cx="408" cy="252" r="0.6" fill="#9a7340"/><circle cx="412" cy="252" r="0.6" fill="#9a7340"/>
    <ellipse cx="382" cy="302" rx="5" ry="4"/><circle cx="380" cy="302" r="0.6" fill="#9a7340"/><circle cx="384" cy="302" r="0.6" fill="#9a7340"/>
    <ellipse cx="354" cy="352" rx="5" ry="4"/><circle cx="352" cy="352" r="0.6" fill="#9a7340"/><circle cx="356" cy="352" r="0.6" fill="#9a7340"/>
    <ellipse cx="326" cy="402" rx="5" ry="4"/><circle cx="324" cy="402" r="0.6" fill="#9a7340"/><circle cx="328" cy="402" r="0.6" fill="#9a7340"/>
  </g>

  <!-- Inverted triangle (yoni-trikoṇa) at the center -->
  <polygon points="180,220 420,220 300,430"
           fill="none" stroke="#c9985e" stroke-width="2.4" opacity="0.95"/>
  <!-- Inner concentric triangle for visual depth -->
  <polygon points="195,240 405,240 300,408"
           fill="none" stroke="#9a7340" stroke-width="1" opacity="0.5"/>

  <!--
    Śava (corpse) silhouette inside the triangle — horizontal supine figure.
    The śava is laid horizontally in the lower half of the triangle, with
    the head pointing left and the limbs splayed.
    This is the iconographic mark distinguishing Tārā's yantra from Kālī's.
  -->
  <g stroke="#e6c089" stroke-width="1.6" fill="none" opacity="0.9">
    <!-- Body (horizontal line) -->
    <line x1="265" y1="355" x2="335" y2="355"/>
    <!-- Head (circle at left end) -->
    <circle cx="262" cy="355" r="5"/>
    <!-- Two arms (perpendicular short lines from the body) -->
    <line x1="290" y1="355" x2="288" y2="340"/>
    <line x1="290" y1="355" x2="292" y2="370"/>
    <line x1="310" y1="355" x2="308" y2="340"/>
    <line x1="310" y1="355" x2="312" y2="370"/>
    <!-- Two legs (splayed short lines from right end of body) -->
    <line x1="335" y1="355" x2="345" y2="346"/>
    <line x1="335" y1="355" x2="345" y2="364"/>
  </g>

  <!-- Central bindu with the Tārā bīja hrīṁ — placed in upper half of triangle -->
  <circle cx="300" cy="280" r="11" fill="#000000"/>
  <circle cx="300" cy="280" r="13" fill="none" stroke="#e6c089" stroke-width="1" opacity="0.7"/>
  <text x="300" y="286" text-anchor="middle"
        font-size="20" fill="#e6c089" font-weight="bold">hrīṁ</text>

  <!-- Gate bīja labels -->
  <text x="570" y="306" text-anchor="end" font-size="22" fill="#e6c089" font-weight="bold">oṁ</text>
  <text x="306" y="585" text-anchor="middle" font-size="22" fill="#e6c089" font-weight="bold">strīṁ</text>
  <text x="30" y="306" text-anchor="start" font-size="22" fill="#e6c089" font-weight="bold">hrīṁ</text>
  <text x="306" y="30" text-anchor="middle" font-size="22" fill="#e6c089" font-weight="bold">hūṁ</text>

  <!-- Title and attribution -->
  <text x="300" y="630" text-anchor="middle"
        font-size="11" fill="#9a7340" letter-spacing="3" opacity="0.8">
    TĀRĀ (UGRA) YANTRA · BṚHAD NĪLA TANTRA / TĀRĀ TANTRA · CAUTION: HIGH
  </text>

</svg>
